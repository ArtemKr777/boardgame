{% extends 'base.html' %}

{% block title %}Выход{% endblock %}

{% block content %}
<h1>👋 Выход из системы</h1>

<p>Вы уверены, что хотите выйти?</p>

<form method="post" action="{% url 'account_logout' %}">
    {% csrf_token %}
    <button type="submit" class="btn">Выйти</button>
    <a href="{% url 'games' %}">Отмена</a>
</form>
{% endblock %}
